      body_de: 'Nach sechs Jahren Bauzeit eroeffnet im Oktober der Erweiterungsbau am Kulturforum.'
    },
    { id: 9, isAd: true },
    {
      id: 10, cat: 'market', accent: '#b8946f',
      image: IMG('kunst-ai'),
      source: 'Right Click Save',
      time_en: '1d ago', time_de: 'vor 1 Tag', read: 8,
      kicker_en: 'Digital art', kicker_de: 'Digitalkunst',
      headline_en: 'Generative AI editions: The quiet market behind the hype',
      headline_de: 'Generative KI-Editions: Der stille Markt hinter dem Hype',
      summary_en: 'While NFTs grabbed headlines, another digital market took shape \u2014 quiet, curated, six-figure.',
      summary_de: 'Waehrend NFTs Schlagzeilen machten, etabliert sich ein anderer digitaler Markt \u2014 leise, kuratiert und im sechsstelligen Bereich.',
      body_en: 'Platforms like Verse, Feral File and Right Click Save have built a market for generative editions over the past two years.',
      body_de: 'Plattformen wie Verse, Feral File und Right Click Save haben in den vergangenen zwei Jahren einen Markt fuer generative Editions etabliert.'
    },
    {
      id: 11, cat: 'artists', accent: '#d4a574',
      image: IMG('kunst-zwirner'),
      source: 'art magazin',
      time_en: '2d ago', time_de: 'vor 2 Tagen', read: 4,
      kicker_en: 'Hamburg', kicker_de: 'Hamburg',
      headline_en: 'Zwirner opens second German location in the Speicherstadt',
      headline_de: 'Zwirner eroeffnet zweiten deutschen Standort in der Speicherstadt',
      summary_en: 'After Berlin, Hamburg \u2014 the mega-gallerist makes a statement for the North.',
      summary_de: 'Nach Berlin folgt jetzt Hamburg \u2014 der Mega-Galerist setzt ein Zeichen fuer den Norden.',
      body_en: "David Zwirner will open an 1,800 sqm space in a warehouse in Hamburg's HafenCity in March 2026.",
      body_de: 'David Zwirner eroeffnet im Maerz 2026 einen 1.800 qm grossen Ausstellungsraum in einem Speicher in Hamburgs HafenCity.'
    }
  ];

  var ICONS = {
    bookmark: '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
    bookmarkOn: '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/><path d="m9 10 2 2 4-4"/>',
    share: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
    sparkles: '<path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M5.6 18.4l2.8-2.8M15.6 8.4l2.8-2.8"/>',
    close: '<path d="M18 6 6 18M6 6l12 12"/>',
    chev: '<path d="m18 15-6-6-6 6"/>',
    chevDown: '<path d="m6 9 6 6 6-6"/>'
  };

  var state = { lang: 'en', cat: 'all', saved: {}, currentIdx: 0 };

  function t(key) { return LABELS[state.lang][key]; }
  function catLabel(key) {
    var i = CAT_KEYS.indexOf(key);
    return LABELS[state.lang].cats[i];
  }
  function getText(story, key) { return story[key + '_' + state.lang]; }
  function filteredStories() {
    if (state.cat === 'all') return STORIES;
    var out = [];
    for (var i = 0; i < STORIES.length; i++) {
      if (STORIES[i].isAd || STORIES[i].cat === state.cat) out.push(STORIES[i]);
    }
    return out;
  }

  function renderCats() {
    var html = '';
    for (var i = 0; i < CAT_KEYS.length; i++) {
      var key = CAT_KEYS[i];
      var label = LABELS[state.lang].cats[i];
      var cls = (state.cat === key) ? ' on' : '';
      html += '<button class="cat' + cls + '" data-cat="' + key + '">' + label + '</button>';
    }
    var el = document.getElementById('cats');
    el.innerHTML = html;
    var btns = el.querySelectorAll('.cat');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function(e) {
        state.cat = e.currentTarget.getAttribute('data-cat');
        renderCats();
        renderFeed();
        document.getElementById('feed').scrollTo({ top: 0 });
      });
    }
  }

  function renderProgress() {
    var items = filteredStories();
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += '<span' + (i === state.currentIdx ? ' class="on"' : '') + '></span>';
    }
    document.getElementById('progress').innerHTML = html;
  }

  function storyHTML(s, idx) {
    var saved = state.saved[s.id];
    var iconBookmark = saved ? ICONS.bookmarkOn : ICONS.bookmark;
    var savedClass = saved ? ' on' : '';
    return '' +
      '<article class="card" data-idx="' + idx + '" data-id="' + s.id + '">' +
        '<div class="card-img" style="background-image:url(\'' + s.image + '\')"></div>' +
        '<div class="card-grad" style="background:linear-gradient(135deg,' + s.accent + ' 0%,transparent 60%)"></div>' +
        '<div class="card-shade"></div>' +
        '<div class="card-top">' +
          '<span class="badge"><span class="badge-dot" style="background:' + s.accent + '"></span>' + catLabel(s.cat) + '</span>' +
          '<span class="meta-time">' + getText(s, 'time') + '</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="kicker">' + getText(s, 'kicker') + '</div>' +
          '<h2 class="headline" data-expand="' + s.id + '">' + getText(s, 'headline') + '</h2>' +
          '<p class="summary">' + getText(s, 'summary') + '</p>' +
          '<div class="card-foot">' +
            '<div class="meta"><span class="source">' + s.source + '</span><span class="sep">\u00B7</span><span>' + s.read + ' ' + t('readingTime') + '</span></div>' +
            '<button class="cta" data-expand="' + s.id + '"><span>' + t('cta') + '</span><svg class="icon icon-sm" viewBox="0 0 24 24">' + ICONS.chev + '</svg></button>' +
          '</div>' +
        '</div>' +
        '<div class="rail">' +
          '<button class="rail-btn' + savedClass + '" data-save="' + s.id + '" aria-label="Save"><svg class="icon icon-lg" viewBox="0 0 24 24">' + iconBookmark + '</svg></button>' +
          '<button class="rail-btn" aria-label="Share"><svg class="icon icon-lg" viewBox="0 0 24 24">' + ICONS.share + '</svg></button>' +
          '<button class="rail-btn rail-ai" aria-label="AI"><svg class="icon icon-lg" viewBox="0 0 24 24">' + ICONS.sparkles + '</svg></button>' +
        '</div>' +
      '</article>';
  }

  function adHTML(idx) {
    return '' +
      '<article class="card card-ad" data-idx="' + idx + '">' +
        '<div class="ad-shell">' +
          '<div class="ad-label"><span class="ad-dot"></span>' + t('ad') + '</div>' +
          '<div class="ad-frame">' +
            '<div class="ad-mark">336 \u00D7 280</div>' +
            '<div class="ad-headline">' + t('adHead') + '</div>' +
            '<div class="ad-sub">' + t('adSub') + '</div>' +
          '</div>' +
          '<div class="ad-note">' + t('adNote') + '</div>' +
        '</div>' +
      '</article>';
  }

  function renderFeed() {
    var items = filteredStories();
    var html = '';
    for (var i = 0; i < items.length; i++) {
      html += items[i].isAd ? adHTML(i) : storyHTML(items[i], i);
    }
    document.getElementById('feed').innerHTML = html;
    bindFeedEvents();
    state.currentIdx = 0;
    renderProgress();
  }

  function bindFeedEvents() {
    var saves = document.querySelectorAll('[data-save]');
    for (var i = 0; i < saves.length; i++) {
      saves[i].addEventListener('click', function(e) {
        e.stopPropagation();
        var id = e.currentTarget.getAttribute('data-save');
        state.saved[id] = !state.saved[id];
        renderFeed();
      });
    }
    var expands = document.querySelectorAll('[data-expand]');
    for (var j = 0; j < expands.length; j++) {
      expands[j].addEventListener('click', function(e) {
        var id = e.currentTarget.getAttribute('data-expand');
        openSheet(id);
      });
    }
  }

  function onScroll() {
    var feed = document.getElementById('feed');
    var idx = Math.round(feed.scrollTop / feed.clientHeight);
    if (idx !== state.currentIdx) {
      state.currentIdx = idx;
      renderProgress();
      document.getElementById('hint').style.display = idx === 0 ? 'flex' : 'none';
    }
  }

  function openSheet(id) {
    var s = null;
    for (var i = 0; i < STORIES.length; i++) {
      if (String(STORIES[i].id) === String(id)) { s = STORIES[i]; break; }
    }
    if (!s) return;
    var saved = state.saved[s.id];
    var html = '' +
      '<button class="sheet-close" id="sheetClose"><svg class="icon" viewBox="0 0 24 24">' + ICONS.close + '</svg></button>' +
      '<div class="sheet-hero" style="background-image:url(\'' + s.image + '\')">' +
        '<div class="sheet-hero-shade"></div>' +
        '<span class="badge"><span class="badge-dot" style="background:' + s.accent + '"></span>' + catLabel(s.cat) + '</span>' +
      '</div>' +
      '<div class="sheet-body">' +
        '<div class="kicker">' + getText(s, 'kicker') + '</div>' +
        '<h1 class="sheet-headline">' + getText(s, 'headline') + '</h1>' +
        '<div class="meta meta-row"><span class="source">' + s.source + '</span><span class="sep">\u00B7</span><span>' + getText(s, 'time') + '</span><span class="sep">\u00B7</span><span>' + s.read + ' ' + t('readingTime') + '</span></div>' +
        '<p class="sheet-lead">' + getText(s, 'summary') + '</p>' +
        '<p class="sheet-text">' + getText(s, 'body') + '</p>' +
        '<div class="inline-ad"><span class="ad-label-small">' + t('ad') + '</span><div class="inline-ad-box">' + t('inArticleAd') + '</div></div>' +
        '<div class="sheet-actions">' +
          '<button class="pill' + (saved ? ' on' : '') + '" id="sheetSave"><svg class="icon icon-sm" viewBox="0 0 24 24">' + (saved ? ICONS.bookmarkOn : ICONS.bookmark) + '</svg>' + (saved ? t('saved') : t('save')) + '</button>' +
          '<button class="pill"><svg class="icon icon-sm" viewBox="0 0 24 24">' + ICONS.share + '</svg>' + t('share') + '</button>' +
        '</div>' +
      '</div>';
    document.getElementById('sheetInner').innerHTML = html;
    document.getElementById('sheet').classList.add('on');
    document.getElementById('sheetClose').addEventListener('click', closeSheet);
    document.getElementById('sheetSave').addEventListener('click', function() {
      state.saved[s.id] = !state.saved[s.id];
      openSheet(s.id);
      renderFeed();
    });
    document.getElementById('sheet').addEventListener('click', function(e) {
      if (e.target.id === 'sheet') closeSheet();
    });
  }
  function closeSheet() {
    document.getElementById('sheet').classList.remove('on');
  }

  function init() {
    var langButtons = document.querySelectorAll('#lang button');
    for (var i = 0; i < langButtons.length; i++) {
      langButtons[i].addEventListener('click', function(e) {
        state.lang = e.currentTarget.getAttribute('data-lang');
        var btns = document.querySelectorAll('#lang button');
        for (var k = 0; k < btns.length; k++) {
          btns[k].classList.toggle('on', btns[k].getAttribute('data-lang') === state.lang);
        }
        document.documentElement.lang = state.lang;
        document.getElementById('hintText').textContent = t('hint');
        renderCats();
        renderFeed();
      });
    }
    document.getElementById('feed').addEventListener('scroll', onScroll);
    renderCats();
    renderFeed();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
