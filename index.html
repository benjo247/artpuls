<!-- ============ Animated PWA Splash (cold-start fade) ============ -->
<!-- Shown on every cold load, fades out once app.js signals ready.
     CSS only — no FOUC. Inline styles to load before any external CSS. -->
<div id="apSplash" style="position:fixed;inset:0;z-index:99999;background:radial-gradient(ellipse 60% 60% at center,rgba(232,80,58,0.05) 0%,transparent 70%),#0e0d0b;display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease;pointer-events:none;-webkit-font-smoothing:antialiased;">
  <div style="position:relative;display:inline-flex;align-items:baseline;transform:translateY(-4%);">
    <span style="font-family:Inter,sans-serif;font-weight:900;font-size:37vw;line-height:1;color:#f4f1ea;letter-spacing:-0.04em;">a</span>
    <span style="position:relative;width:5.92vw;height:5.92vw;border-radius:50%;background:#e8503a;margin-left:0.93vw;transform:translateY(0.93vw);flex-shrink:0;">
      <span style="content:'';position:absolute;inset:0;border-radius:50%;background:#e8503a;animation:apSplashPing 2.4s cubic-bezier(0,0,0.25,1) infinite;display:block;"></span>
    </span>
  </div>
  <div style="position:absolute;bottom:6.5vh;left:50%;transform:translateX(-50%);font-family:'Geist Mono',monospace;font-size:2.6vw;letter-spacing:0.32em;text-transform:uppercase;color:#f4f1ea;white-space:nowrap;">
    since<span style="display:inline-block;width:0.94vw;height:0.94vw;border-radius:50%;background:#e8503a;margin:0 2.2vw;vertical-align:middle;transform:translateY(-0.13vw);"></span>2026
  </div>
</div>
<style>
  @keyframes apSplashPing {
    0%   { transform: scale(1);   opacity: 0.7; }
    100% { transform: scale(3.5); opacity: 0;   }
  }
  /* On wider screens, cap mark size for desktop / tablet landscape */
  @media (min-width: 700px) {
    #apSplash > div:first-child > span:first-child { font-size: min(37vw, 280px) !important; }
    #apSplash > div:first-child > span:last-child { width: min(5.92vw, 44px) !important; height: min(5.92vw, 44px) !important; }
    #apSplash > div:last-child { font-size: min(2.6vw, 20px) !important; }
  }
  /* When app signals ready, fade out then remove pointer events */
  #apSplash.ap-splash-hide { opacity: 0; pointer-events: none; }
</style>
