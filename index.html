<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e0d0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ArtPulse">

<title>ArtPulse — Art world, in one breath</title>
<meta name="description" content="The art world, condensed. Compact news from auctions, exhibitions, biennials and the market.">

<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/styles.css">

<!--
  AdSense loader. Uncomment and replace ca-pub-XXXX with your publisher ID
  ONCE your AdSense account is approved.
-->
<!--
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
-->
</head>
<body>
<div class="phone">
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-mark">&bull;</span>
        <span>Art<em>Pulse</em></span>
      </div>
      <div class="header-actions">
        <div class="lang" id="lang">
          <button data-lang="en" class="on">EN</button>
          <button data-lang="de">DE</button>
        </div>
        <button class="icon-btn" aria-label="Search">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
      </div>
    </div>
    <div class="cats" id="cats"></div>
    <div class="progress" id="progress"></div>
  </header>

  <main class="feed" id="feed">
    <div class="loading" id="loading">
      <div class="loading-pulse"></div>
      <span class="loading-label" id="loadingLabel">Fetching the latest…</span>
    </div>
  </main>

  <div class="hint" id="hint" hidden>
    <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
    <span id="hintText">swipe up</span>
  </div>

  <div class="sheet" id="sheet">
    <div class="sheet-inner" id="sheetInner"></div>
  </div>

  <div class="toast" id="toast" hidden></div>
</div>

<script src="/ads.js" defer></script>
<script src="/app.js" defer></script>
<script>
  // Register service worker for PWA / offline
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function (err) {
        console.warn('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
