name: Fetch news

on:
  schedule:
    # 3x daily at 06:07, 11:07, 17:07 UTC
    # Aligns with European morning, lunch, and evening — captures Asia overnight + US daytime news
    - cron: '7 6,11,17 * * *'
  workflow_dispatch:       # manual trigger button in GitHub UI
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-news.mjs'   # rerun when the script itself changes

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run fetch-news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run build:news

      - name: Commit generated files
        run: |
          git config user.name "kunstpuls-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(news): update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
