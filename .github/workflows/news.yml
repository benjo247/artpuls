name: Fetch news

on:
  schedule:
    # 3x daily at 06:07, 11:07, 17:07 UTC
    - cron: '7 6,11,17 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-news.mjs'

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so rebase works cleanly

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false   # we don't have a lock file in the repo

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run fetch-news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run build:news

      - name: Commit generated files
        run: |
          git config user.name "kunstpuls-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(news): update $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retry push with rebase if remote has new commits (race condition handling)
          for i in 1 2 3; do
            if git push; then
              echo "Push successful on attempt $i"
              exit 0
            fi
            echo "Push failed, attempt $i — pulling and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts"
          exit 1
