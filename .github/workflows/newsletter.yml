name: newsletter

# Monthly: 1st of each month at 09:00 UTC (10:00 winter / 11:00 summer Berlin).
# Plus: manual trigger anytime for testing.
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build newsletter draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-newsletter.mjs

      - name: Create GitHub Issue with draft
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const snippetEN = fs.readFileSync('newsletter-snippet-en.html', 'utf-8');
            const snippetDE = fs.readFileSync('newsletter-snippet-de.html', 'utf-8');
            const meta = JSON.parse(fs.readFileSync('newsletter-meta.json', 'utf-8'));

            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                            'July', 'August', 'September', 'October', 'November', 'December'];
            const now = new Date();
            const issueLabel = `${months[now.getMonth()]} ${now.getFullYear()}`;

            const body = [
              `## 📰 Newsletter draft: ArtPulse · ${issueLabel}`,
              ``,
              `**EN Subject:** \`${meta.subjectEN}\``,
              `**DE Subject:** \`${meta.subjectDE}\``,
              `**Stories:** ${meta.count}`,
              `**Categories:** ${meta.categories.join(', ')}`,
              `**Generated:** ${meta.generatedAt}`,
              ``,
              `---`,
              ``,
              `### Send-Workflow`,
              ``,
              `1. **Beehiiv öffnen** → Start writing (neuer Post)`,
              `2. **Title** oben einfügen: \`${meta.subjectEN}\` (oder DE-Version)`,
              `3. Im Body-Editor **\`/html\`** tippen → "HTML Snippet" auswählen`,
              `4. Snippet unten (EN oder DE) komplett kopieren und einfügen`,
              `5. **Preview** → **Send Test Email** an dich selbst`,
              `6. Wenn alles passt: **Send** (oder Schedule)`,
              ``,
              `Aktueller Plan: **EN ist primär** (Hauptanteil Erstnutzer ist englischsprachig). DE-Version ist Backup bzw. für später wenn Sprach-Segmentierung in Beehiiv eingerichtet ist.`,
              ``,
              `---`,
              ``,
              `### English Snippet (paste-ready)`,
              ``,
              `<details>`,
              `<summary><b>EN-Snippet anzeigen</b></summary>`,
              ``,
              '```html',
              snippetEN,
              '```',
              ``,
              `</details>`,
              ``,
              `---`,
              ``,
              `### Deutsches Snippet (paste-ready)`,
              ``,
              `<details>`,
              `<summary><b>DE-Snippet anzeigen</b></summary>`,
              ``,
              '```html',
              snippetDE,
              '```',
              ``,
              `</details>`,
              ``,
              `---`,
              ``,
              `_Automatisch generiert. Komplettes HTML (mit Wrapper, beide Sprachen) als Artifact am Workflow-Run angehängt._`
            ].join('\n');

            if (body.length > 60000) {
              console.warn(`Body length ${body.length} approaching GitHub limit.`);
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📰 Newsletter Draft: ${meta.subjectEN}`,
              body: body
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

      - name: Upload HTML as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-draft
          path: |
            newsletter-en.html
            newsletter-de.html
            newsletter-snippet-en.html
            newsletter-snippet-de.html
            newsletter-meta.json
          retention-days: 90
